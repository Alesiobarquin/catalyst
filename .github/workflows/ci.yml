name: CI

on:
  pull_request:
    branches: [ main ]
  push:
    branches: [ main ]

permissions:
  contents: read

jobs:
  python-lint-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest pytest-asyncio ruff redis kafka-python-ng pandas yfinance
          pip install -r api/requirements.txt
          pip install -r gatekeeper/requirements.txt
          pip install -r ai_layer/requirements.txt
          pip install -r hunters/requirements.txt

      - name: Ruff lint
        run: ruff check gatekeeper ai_layer hunters persistence tests --output-format=github

      - name: Ruff format check
        run: ruff format --check gatekeeper ai_layer hunters persistence tests

      - name: Unit tests
        run: PYTHONPATH=. python -m pytest tests/ -v --tb=short

  frontend-ci:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: npm ci

      - name: Frontend lint
        run: npm run lint

      - name: Frontend typecheck
        run: npm run typecheck

      - name: Frontend build
        run: npm run build

  engine-test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: engine
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven

      - name: Run engine tests
        run: mvn -B test
