x-hunter-common: &hunter-common
  build:
    context: ./hunters # Looks up one folder to 'catalyst/hunters'
    dockerfile: Dockerfile # Uses the Dockerfile we created
  image: alpha-stream-hunters # Names the image so all hunters reuse it
  environment:
    - KAFKA_BOOTSTRAP_SERVERS=kafka:29092 # Connects internally to Kafka
    - REDIS_HOST=redis
    - REDIS_PORT=6379
    # Hunters read only their own interval; defaults match hunters/common/config.py
    - SQUEEZE_INTERVAL_SECONDS=${SQUEEZE_INTERVAL_SECONDS:-900}
    - BIOTECH_INTERVAL_SECONDS=${BIOTECH_INTERVAL_SECONDS:-1800}
    - FMP_API_KEY=${FMP_API_KEY:-}
    - DRIFTER_INTERVAL_SECONDS=${DRIFTER_INTERVAL_SECONDS:-3600}
    - DRIFTER_MIN_SURPRISE_PERCENT=${DRIFTER_MIN_SURPRISE_PERCENT:-5.0}
    - DRIFTER_LOOKBACK_DAYS=${DRIFTER_LOOKBACK_DAYS:-3}
    - WHALE_INTERVAL_SECONDS=${WHALE_INTERVAL_SECONDS:-3600}
  depends_on:
    kafka:
      condition: service_healthy
    redis:
      condition: service_healthy

services:
  # ==========================================
  # LAYER 1: THE HUNTERS (PYTHON INGESTION)
  # ==========================================

  # 1. SQUEEZE HUNTER
  hunter-squeeze:
    <<: *hunter-common
    container_name: hunter_squeeze
    command: [ "python", "-m", "hunters.main", "squeeze" ]
    restart: always
    volumes:
      - ./hunters:/app/hunters

  # 2. INSIDER HUNTER
  hunter-insider:
    <<: *hunter-common
    container_name: hunter_insider
    command: ["python", "-m", "hunters.main", "insider"]
    restart: on-failure
    volumes:
      - ./hunters:/app/hunters

  # 3. BIOTECH HUNTER
  hunter-biotech:
    <<: *hunter-common
    container_name: hunter_biotech
    command: ["python", "-m", "hunters.main", "biotech"]
    restart: always
    volumes:
      - ./hunters:/app/hunters

  # 4. DRIFTER (earnings beats — FMP calendar; needs FMP_API_KEY)
  hunter-drifter:
    <<: *hunter-common
    container_name: hunter_drifter
    command: ["python", "-m", "hunters.main", "drifter"]
    restart: always
    volumes:
      - ./hunters:/app/hunters

  # 5. WHALE (Barchart unusual options — Playwright)
  hunter-whale:
    <<: *hunter-common
    container_name: hunter_whale
    command: ["python", "-m", "hunters.main", "whale"]
    restart: always
    volumes:
      - ./hunters:/app/hunters

  # ==========================================
  # LAYER 2: KAFKA INFRASTRUCTURE
  # ==========================================

  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    hostname: zookeeper
    container_name: catalyst_zookeeper
    ports:
      - "2181:2181"
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    hostname: kafka
    container_name: catalyst_kafka
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: 'zookeeper:2181'
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      # CRITICAL: 
      # - 'kafka:29092' is for internal Docker services (Hunters/Java)
      # - 'localhost:9092' is for your laptop (Java running in IntelliJ)
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
    healthcheck:
      test: ["CMD-SHELL", "kafka-topics --bootstrap-server localhost:9092 --list > /dev/null 2>&1"]
      interval: 10s
      timeout: 10s
      retries: 10
      start_period: 20s

  # ==========================================
  # LAYER 5: THE MEMORY (DB + CACHE)
  # ==========================================

  timescaledb:
    image: timescale/timescaledb:latest-pg16
    container_name: catalyst_db
    hostname: timescaledb
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: catalyst_user
      POSTGRES_PASSWORD: password123
      POSTGRES_DB: catalyst_db
    volumes:
      # Persist data so you don't lose trades when you restart Docker
      - ./data/postgres:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: catalyst_redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  # ==========================================
  # LAYER 2.5: GATEKEEPER
  # ==========================================

  gatekeeper:
    build:
      context: .
      dockerfile: gatekeeper/Dockerfile
    container_name: catalyst_gatekeeper
    environment:
      - KAFKA_BOOTSTRAP_SERVERS=kafka:29092
      - REDIS_HOST=redis
      - REDIS_PORT=6379
    depends_on:
      kafka:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    volumes:
      - ./gatekeeper:/app/gatekeeper

  # ==========================================
  # LAYER 3: AI ANALYSIS
  # ==========================================

  ai-layer:
    build:
      context: .
      dockerfile: ai_layer/Dockerfile
    container_name: catalyst_ai_layer
    environment:
      - KAFKA_BOOTSTRAP_SERVERS=kafka:29092
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - GEMINI_MODEL=${GEMINI_MODEL}
      - GEMINI_TEMPERATURE=${GEMINI_TEMPERATURE}
      - GEMINI_MAX_RETRIES=${GEMINI_MAX_RETRIES}
      - GEMINI_INITIAL_BACKOFF_SECONDS=${GEMINI_INITIAL_BACKOFF_SECONDS}
      - AI_MIN_CONVICTION_SCORE=${AI_MIN_CONVICTION_SCORE}
    depends_on:
      kafka:
        condition: service_healthy
      redis:
        condition: service_healthy
      gatekeeper:
        condition: service_started
    restart: unless-stopped
    volumes:
      - ./ai_layer:/app/ai_layer

  # ==========================================
  # PERSISTENCE (TimescaleDB consumer)
  # ==========================================

  persistence:
    build:
      context: .
      dockerfile: persistence/Dockerfile
    container_name: catalyst_persistence
    environment:
      - KAFKA_BOOTSTRAP_SERVERS=kafka:29092
      - VALIDATED_SIGNALS_TOPIC=validated-signals
      - TIMESCALE_HOST=timescaledb
      - TIMESCALE_PORT=5432
      - TIMESCALE_USER=catalyst_user
      - TIMESCALE_PASSWORD=password123
      - TIMESCALE_DB=catalyst_db
    depends_on:
      kafka:
        condition: service_healthy
      timescaledb:
        condition: service_started
    restart: unless-stopped
    volumes:
      - ./persistence:/app/persistence

  # ==========================================
  # LAYER 4: JAVA STRATEGY ENGINE
  # ==========================================

  engine:
    build:
      context: ./engine
      dockerfile: Dockerfile
    container_name: catalyst_engine
    ports:
      - "8081:8081"
    environment:
      # Kafka
      - KAFKA_BOOTSTRAP_SERVERS=kafka:29092
      - VALIDATED_SIGNALS_TOPIC=validated-signals
      - TRADE_ORDERS_TOPIC=trade-orders
      # TimescaleDB
      - TIMESCALE_HOST=timescaledb
      - TIMESCALE_PORT=5432
      - TIMESCALE_USER=catalyst_user
      - TIMESCALE_PASSWORD=password123
      - TIMESCALE_DB=catalyst_db
      # Kelly sizing
      - PORTFOLIO_VALUE=100000
      - MAX_KELLY_FRACTION=0.25
      # Regime thresholds
      - VIX_HALT_THRESHOLD=40.0
      - VIX_SCALPER_ONLY_THRESHOLD=30.0
      - REGIME_REFRESH_MS=300000
    depends_on:
      kafka:
        condition: service_healthy
      timescaledb:
        condition: service_started
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8081/actuator/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    restart: unless-stopped

  # ==========================================
  # LAYER 6: FASTAPI READ API
  # ==========================================

  api:
    build:
      context: .
      dockerfile: api/Dockerfile
    container_name: catalyst_api
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql://catalyst_user:password123@timescaledb:5432/catalyst_db
      - CORS_ORIGINS=["http://localhost:3000","http://localhost:3001"]
      - ENGINE_HEALTH_URL=http://engine:8081/actuator/health
      - CLERK_ISSUER=${CLERK_ISSUER:-}
      - CLERK_JWKS_URL=${CLERK_JWKS_URL:-}
    depends_on:
      timescaledb:
        condition: service_started
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/health')\" || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped

  # Alpaca paper executor — consumes trade-orders, places orders per user_alpaca_keys
  executor:
    build:
      context: .
      dockerfile: executor/Dockerfile
    container_name: catalyst_executor
    environment:
      - KAFKA_BOOTSTRAP_SERVERS=kafka:29092
      - TRADE_ORDERS_TOPIC=trade-orders
      - EXECUTOR_CONSUMER_GROUP=catalyst-alpaca-executor
      - KAFKA_AUTO_OFFSET_RESET=latest
      - TIMESCALE_HOST=timescaledb
      - TIMESCALE_PORT=5432
      - TIMESCALE_USER=catalyst_user
      - TIMESCALE_PASSWORD=password123
      - TIMESCALE_DB=catalyst_db
      - ALPACA_PAPER_BASE=https://paper-api.alpaca.markets
    depends_on:
      kafka:
        condition: service_healthy
      timescaledb:
        condition: service_started
      engine:
        condition: service_started
    restart: unless-stopped

  # ==========================================
  # NEXT.JS DASHBOARD (not included in backend-only workflows)
  # ==========================================

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    container_name: catalyst_frontend
    ports:
      - "3000:3000"
    environment:
      # Browser (client): host machine reaches API on localhost:8000
      - NEXT_PUBLIC_API_URL=http://localhost:8000
      # Server components inside this container reach the API by service name
      - API_INTERNAL_URL=http://api:8000
      - NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY=${NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY:-}
      - CLERK_SECRET_KEY=${CLERK_SECRET_KEY:-}
    depends_on:
      api:
        condition: service_healthy
    volumes:
      - ./frontend:/app
      - /app/node_modules
      - /app/.next
    restart: unless-stopped

  # ==========================================
  # TOOLS (VISUALIZATION)
  # ==========================================

  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: catalyst_kafka_ui
    ports:
      - "8080:8080"
    depends_on:
      - kafka
    environment:
      KAFKA_CLUSTERS_0_NAME: local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:29092
      KAFKA_CLUSTERS_0_ZOOKEEPER: zookeeper:2181

  redisinsight:
    image: redis/redisinsight:latest
    container_name: catalyst_redisinsight
    ports:
      - "5540:5540"
    depends_on:
      redis:
        condition: service_healthy
