services:
  # ==========================================
  # LAYER 1: THE HUNTERS (PYTHON INGESTION)
  # ==========================================

  # 1. HUNTER BASE (The Builder)
  # This service builds the Docker image once. All other hunters use this image.
  hunter-base:
    build:
      context: ./hunters # Looks up one folder to 'catalyst/hunters'
      dockerfile: Dockerfile # Uses the Dockerfile we created
    image: alpha-stream-hunters # Names the image so we can reuse it
    environment:
      - KAFKA_BOOTSTRAP_SERVERS=kafka:29092 # Connects internally to Kafka
      - REDIS_HOST=redis
      - REDIS_PORT=6379
    depends_on:
      kafka:
        condition: service_healthy
      redis:
        condition: service_healthy
    # This prevents this specific container from running on its own
    # It exists only to be extended by the others.

    # 2. SQUEEZE HUNTER (The Instance)
  hunter-squeeze:
    extends: hunter-base
    container_name: hunter_squeeze
    command: [ "python", "-m", "hunters.main", "squeeze" ]
    restart: on-failure
    volumes:
      - ./hunters:/app/hunters

  # 3. INSIDER HUNTER (The Instance)
  hunter-insider:
    extends: hunter-base
    container_name: hunter_insider
    command: ["python", "-m", "hunters.main", "insider"]
    restart: on-failure
    volumes:
      - ./hunters:/app/hunters

  # 4. BIOTECH HUNTER (The Instance)
  hunter-biotech:
    extends: hunter-base
    container_name: hunter_biotech
    command: ["python", "-m", "hunters.main", "biotech"]
    restart: on-failure
    volumes:
      - ./hunters:/app/hunters

  # ==========================================
  # LAYER 2: KAFKA INFRASTRUCTURE
  # ==========================================

  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    hostname: zookeeper
    container_name: catalyst_zookeeper
    ports:
      - "2181:2181"
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    hostname: kafka
    container_name: catalyst_kafka
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: 'zookeeper:2181'
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      # CRITICAL: 
      # - 'kafka:29092' is for internal Docker services (Hunters/Java)
      # - 'localhost:9092' is for your laptop (Java running in IntelliJ)
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
    healthcheck:
      test: ["CMD-SHELL", "kafka-topics --bootstrap-server localhost:9092 --list > /dev/null 2>&1"]
      interval: 10s
      timeout: 10s
      retries: 10
      start_period: 20s

  # ==========================================
  # LAYER 5: THE MEMORY (DB + CACHE)
  # ==========================================

  timescaledb:
    image: timescale/timescaledb:latest-pg16
    container_name: catalyst_db
    hostname: timescaledb
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: catalyst_user
      POSTGRES_PASSWORD: password123
      POSTGRES_DB: catalyst_db
    volumes:
      # Persist data so you don't lose trades when you restart Docker
      - ./data/postgres:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: catalyst_redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  # ==========================================
  # LAYER 2.5: GATEKEEPER
  # ==========================================

  gatekeeper:
    build:
      context: .
      dockerfile: gatekeeper/Dockerfile
    container_name: catalyst_gatekeeper
    environment:
      - KAFKA_BOOTSTRAP_SERVERS=kafka:29092
      - REDIS_HOST=redis
      - REDIS_PORT=6379
    depends_on:
      kafka:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    volumes:
      - ./gatekeeper:/app/gatekeeper

  # ==========================================
  # LAYER 3: AI ANALYSIS
  # ==========================================

  ai-layer:
    build:
      context: .
      dockerfile: ai_layer/Dockerfile
    container_name: catalyst_ai_layer
    environment:
      - KAFKA_BOOTSTRAP_SERVERS=kafka:29092
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - GEMINI_MODEL=${GEMINI_MODEL}
      - GEMINI_TEMPERATURE=${GEMINI_TEMPERATURE}
      - GEMINI_MAX_RETRIES=${GEMINI_MAX_RETRIES}
      - GEMINI_INITIAL_BACKOFF_SECONDS=${GEMINI_INITIAL_BACKOFF_SECONDS}
      - AI_MIN_CONVICTION_SCORE=${AI_MIN_CONVICTION_SCORE}
    depends_on:
      kafka:
        condition: service_healthy
      redis:
        condition: service_healthy
      gatekeeper:
        condition: service_started
    restart: unless-stopped
    volumes:
      - ./ai_layer:/app/ai_layer

  # ==========================================
  # PERSISTENCE (TimescaleDB consumer)
  # ==========================================

  persistence:
    build:
      context: .
      dockerfile: persistence/Dockerfile
    container_name: catalyst_persistence
    environment:
      - KAFKA_BOOTSTRAP_SERVERS=kafka:29092
      - VALIDATED_SIGNALS_TOPIC=validated-signals
      - TIMESCALE_HOST=timescaledb
      - TIMESCALE_PORT=5432
      - TIMESCALE_USER=catalyst_user
      - TIMESCALE_PASSWORD=password123
      - TIMESCALE_DB=catalyst_db
    depends_on:
      kafka:
        condition: service_healthy
      timescaledb:
        condition: service_started
    restart: unless-stopped
    volumes:
      - ./persistence:/app/persistence

  # ==========================================
  # TOOLS (VISUALIZATION)
  # ==========================================

  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: catalyst_kafka_ui
    ports:
      - "8080:8080"
    depends_on:
      - kafka
    environment:
      KAFKA_CLUSTERS_0_NAME: local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:29092
      KAFKA_CLUSTERS_0_ZOOKEEPER: zookeeper:2181

  redisinsight:
    image: redis/redisinsight:latest
    container_name: catalyst_redisinsight
    ports:
      - "5540:5540"
    depends_on:
      redis:
        condition: service_healthy
